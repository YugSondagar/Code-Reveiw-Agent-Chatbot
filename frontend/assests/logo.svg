<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Background Circle -->
    <circle cx="100" cy="100" r="90" fill="url(#gradient)" />
    
    <!-- Robot Face -->
    <rect x="60" y="50" width="80" height="60" rx="15" fill="white" fill-opacity="0.9" />
    <circle cx="75" cy="80" r="10" fill="#333" />
    <circle cx="125" cy="80" r="10" fill="#333" />
    <circle cx="100" cy="105" r="5" fill="#333" />
    
    <!-- Code Symbols -->
    <text x="50" y="140" font-family="monospace" font-size="24" fill="white" font-weight="bold">{code}</text>
    
    <!-- Gradient Definition -->
    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#6366f1" />
            <stop offset="100%" stop-color="#4f46e5" />
        </linearGradient>
    </defs>
</svg>